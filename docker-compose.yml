services:
  sentinel-ray:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-ray
    ports:
      - "8265:8265"
    volumes:
      - ./data/quarantine:/app/data/quarantine
      - ./alerts:/app/alerts
      - ./logs:/app/logs
    environment:
      RAY_NUM_CPUS: "2"
      QA_WORKER_POOL_SIZE: "3"
      RETRAINING_WEBHOOK_URL: "http://host.docker.internal:8080/api/v1/retrain"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 512M
    restart: "no"
